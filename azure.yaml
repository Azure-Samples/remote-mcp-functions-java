# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: remote-mcp-functions-java
metadata:
  template: remote-mcp-functions-java@1.0.0
infra:
  provider: bicep
  path: ./infra
services:
  api:
    project: ./samples/FunctionsMcpTool/
    language: java
    host: function
  weather:
    project: ./samples/McpWeatherApp/
    language: java
    host: function
    hooks:
      prepackage:
        windows:
          shell: pwsh
          run: cd app; npm install; npm run build
        posix:
          shell: sh
          run: cd app && npm install && npm run build
